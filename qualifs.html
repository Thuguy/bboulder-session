<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bleau Boulder Session &#8212; Qualifications</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">BLEAU<span>.</span>BOULDER</div>
            <p class="subtitle">SESSION &#8212; 27 &amp; 28 JUIN 2026</p>
            <div id="user-info" class="user-info"></div>
        </header>

        <div id="already-submitted" class="hidden card">
            <p class="text-center">Tes resultats ont deja ete soumis. Contacte un juge si tu as une correction a faire.</p>
        </div>

        <div id="form-container">
            <div id="blocs-container"></div>

            <div class="score-preview card">
                <span class="label">SCORE ACTUEL</span>
                <span id="score-display" class="score-value">0.0</span>
            </div>

            <button id="submit-btn" onclick="soumettre()">
                VALIDER MES RESULTATS
            </button>

            <div id="feedback" class="hidden"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
