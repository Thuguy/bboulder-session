<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBoulder &#8212; Qualifications</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">BBOULDER</div>
            <p class="subtitle">QUALIFICATIONS</p>
            <div id="user-info" class="user-info"></div>
        </header>

        <div id="already-submitted" class="hidden card">
            <p class="text-center">Tes r&#233;sultats ont d&#233;j&#224; &#233;t&#233; soumis. Contacte un juge si tu as une correction &#224; faire.</p>
        </div>

        <div id="form-container">
            <div id="blocs-container"></div>

            <div class="score-preview card">
                <span class="label">SCORE ACTUEL</span>
                <span id="score-display" class="score-value">0.0</span>
            </div>

            <button id="submit-btn" onclick="soumettre()">
                VALIDER MES R&#201;SULTATS
            </button>

            <div id="feedback" class="hidden"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
