<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />

    <title>BBoulder &#8212; Classement</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">BBOULDER</div>
            <p class="subtitle">BLEAU BOULDER SESSION &#8212; 27 &amp; 28 JUIN 2026</p>

        <div id="phase-label" class="section-title">Chargement...</div>

        <!-- CLASSEMENT HOMMES -->
        <div class="section-title">HOMMES</div>
        <table id="leaderboard-homme">
            <thead>
                <tr>
                    <th>#</th>
                    <th>PARTICIPANT</th>
                    <th>BLOCS</th>
                    <th>ESSAIS</th>
                    <th>SCORE</th>

            </thead>
            <tbody id="tbody-homme">
                <tr><td colspan="5">Chargement...</td></tr>
            </tbody>
        </table>

        <!-- CLASSEMENT FEMMES -->
        <div class="section-title" style="margin-top: 32px;">FEMMES</div>
        <table id="leaderboard-femme">
            <thead>
                <tr>
                    <th>#</th>
                    <th>PARTICIPANT</th>
                    <th>BLOCS</th>
                    <th>ESSAIS</th>
                    <th>SCORE</th>
                </tr>
            </thead>
            <tbody id="tbody-femme">
                <tr><td colspan="5">Chargement...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="leaderboard.js"></script>
</body>
</html>
