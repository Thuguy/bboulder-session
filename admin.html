<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bleau Boulder Session &#8212; Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">BLEAU<span>.</span>BOULDER</div>
            <p class="subtitle">ESPACE JUGE</p>
            <div class="nav-row">
                <button class="btn-small" onclick="window.location.href='leaderboard.html'">CLASSEMENT</button>
                <button class="btn-small" onclick="window.location.href='juge.html'">JUGE</button>
                <button class="btn-small btn-outline" onclick="deconnexion()">DECONNEXION</button>
            </div>
        </header>

        <div class="section-title">PHASE EN COURS</div>
        <div class="card phase-card">
            <div id="phase-actuelle" class="phase-badge">Chargement...</div>
            <div class="phase-buttons">
                <button class="btn-phase" onclick="changerPhase('qualifs')">QUALIFS</button>
                <button class="btn-phase" onclick="changerPhase('demis')">DEMI-FINALES</button>
                <button class="btn-phase" onclick="changerPhase('finale')">FINALE</button>
            </div>
        </div>

        <div class="section-title">AJOUTER UN PARTICIPANT</div>
        <div class="card">
            <div class="form-row">
                <input type="text" id="new-prenom" placeholder="Prenom" />
                <input type="text" id="new-nom" placeholder="Nom" />
            </div>
            <div class="toggle-group">
                <div class="toggle-label">CATEGORIE</div>
                <div class="toggle-buttons">
                    <button class="btn-toggle active" id="toggle-homme" onclick="setCategorie('homme')">HOMME</button>
                    <button class="btn-toggle" id="toggle-femme" onclick="setCategorie('femme')">FEMME</button>
                </div>
            </div>

            <div class="toggle-group">
                <div class="toggle-label">TYPE</div>
                <div class="toggle-buttons">
                    <button class="btn-toggle active" id="toggle-participant" onclick="setRole('participant')">PARTICIPANT</button>
                    <button class="btn-toggle" id="toggle-juge" onclick="setRole('juge')">JUGE</button>
                </div>
            </div>
            <button class="btn-full" onclick="creerParticipant()">CREER LE COMPTE</button>
            <div id="create-feedback" class="hidden feedback"></div>
        </div>

        <div class="section-title">PARTICIPANTS</div>
        <div class="filter-row">
            <button class="btn-filter active" onclick="filtrer('tous', this)">TOUS</button>
            <button class="btn-filter" onclick="filtrer('homme', this)">HOMMES</button>
            <button class="btn-filter" onclick="filtrer('femme', this)">FEMMES</button>
            <button class="btn-filter" onclick="filtrer('juge', this)">JUGES</button>
        </div>
        <input type="text"
               id="search-participant"
               placeholder="Rechercher un participant..."
               oninput="afficherParticipants()"
               style="margin-bottom: 12px;" />
        <div id="participants-list"></div>

        <div id="modal" class="modal hidden">
            <div class="modal-content card">
                <div class="modal-title">MODIFIER LE SCORE</div>
                <div id="modal-body"></div>
                <div class="modal-buttons">
                    <button class="btn-full" onclick="sauvegarderCorrection()">SAUVEGARDER</button>
                    <button class="btn-full btn-outline" onclick="fermerModal()">ANNULER</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
    <button onclick="genererTestData()" style="opacity:0.1; margin-top:40px; width:100%">TEST</button>
    <button onclick="viderBDD()" style="opacity:0.1; margin-top:8px; width:100%">VIDER BDD</button>
</body>
</html>
