<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBoulder &#8212; Saisie Juge</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">BBOULDER</div>
            <p class="subtitle">SAISIE JUGE</p>
            <button class="btn-small btn-outline" onclick="deconnexion()">DECONNEXION</button>
        </header>

        <!-- SELECTION PARTICIPANT -->
        <div class="section-title">S&#201;LECTIONNER UN PARTICIPANT</div>
        <div class="card">
            <div class="filter-row">
                <button class="btn-filter active" onclick="filtrerCategorie('tous')">TOUS</button>
                <button class="btn-filter" onclick="filtrerCategorie('homme')">HOMMES</button>
                <button class="btn-filter" onclick="filtrerCategorie('femme')">FEMMES</button>
            </div>
            <div id="participants-select"></div>
        </div>

        <!-- FORMULAIRE SAISIE -->
        <div id="saisie-container" class="hidden">
            <div class="section-title">
                SAISIE &#8212; <span id="participant-nom"></span>
            </div>

            <div id="blocs-juge"></div>

            <div class="score-preview card">
                <span class="label">SCORE</span>
                <span id="score-display" class="score-value">0.0</span>
            </div>

            <button id="valider-btn" onclick="validerScore()">
                VALIDER ET SOUMETTRE
            </button>

            <button id="reset-btn" class="btn-outline btn-full" onclick="resetSaisie()">
                ANNULER
            </button>

            <div id="juge-feedback" class="hidden feedback"></div>
        </div>
    </div>

    <script type="module" src="juge.js"></script>
</body>
</html>
