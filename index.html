<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BBoulder Session</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container center">
        <div class="card login-card">
            <div class="logo">BBOULDER</div>
            <p class="subtitle">BLEAU BOULDER SESSION &#8212; 27 &amp; 28 JUIN 2026</p>

            <input type="text" id="prenom" placeholder="Prenom" />
            <input type="text" id="nom" placeholder="Nom" />
            <input type="password" id="password" placeholder="Mot de passe" />

            <div id="error-msg" class="hidden feedback error">
                Identifiants incorrects, reessaie.
            </div>

            <button id="login-btn" class="btn-full" onclick="login()">
                SE CONNECTER
            </button>
        </div>
    </div>

    <script type="module">
        import { login, getSession } from "./auth.js";

        const session = getSession();
        if (session) {
            if (session.role === "juge" || session.role === "admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "qualifs.html";
            }
        }

        window.login = async () => {
            const prenom = document.getElementById("prenom").value;
            const nom = document.getElementById("nom").value;
            const password = document.getElementById("password").value;
            const btn = document.getElementById("login-btn");
            const errMsg = document.getElementById("error-msg");

            if (!prenom || !nom || !password) {
                errMsg.textContent = "Merci de remplir tous les champs.";
                errMsg.classList.remove("hidden");
                return;
            }

            btn.disabled = true;
            btn.textContent = "CONNEXION...";
            errMsg.classList.add("hidden");

            try {
                const user = await login(prenom, nom, password);
                if (!user) {
                    errMsg.textContent = "Identifiants incorrects, reessaie.";
                    errMsg.classList.remove("hidden");
                    btn.disabled = false;
                    btn.textContent = "SE CONNECTER";
                    return;
                }

                if (user.role === "juge" || user.role === "admin") {
                    window.location.href = "admin.html";
                } else {
                    window.location.href = "qualifs.html";
                }

            } catch (e) {
                console.error(e);
                errMsg.textContent = "Erreur de connexion, reessaie.";
                errMsg.classList.remove("hidden");
                btn.disabled = false;
                btn.textContent = "SE CONNECTER";
            }
        };
    </script>
</body>
</html>
